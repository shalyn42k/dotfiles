# Функциональные настройки ТОЛЬКО для рига ilyamiro (hyprlang).
# Порт из lua-конфига caelestia (input/misc/env/execs) — то, без чего
# неудобно жить в его риге. Внешний вид (анимации, гапсы, блюр) НЕ
# трогаем — его стиль остаётся его. Подключается ПОСЛЕДНИМ, поэтому
# переопределяет его автогенерённый settings.conf.

# ─── Ввод: раскладки pl/ru + SUPER+SPACE (как в caelestia) ───
input {
    kb_layout = pl, ru
    kb_options = grp:win_space_toggle
    numlock_by_default = false
    repeat_delay = 250
    repeat_rate = 35
    focus_on_close = 1

    touchpad {
        natural_scroll = true
        disable_while_typing = true
        scroll_factor = 0.3
    }
}

binds {
    scroll_event_delay = 0
}

# Без этого правило `immediate` для steam/gamescope из rules-ilyamiro.conf
# ничего не делает (у него в settings.conf allow_tearing не задан → false)
general {
    allow_tearing = true
}

cursor {
    hotspot_padding = 1
}

# Группы окон (ALT+Q) — цвета его matugen-темы ($* из colors.conf),
# иначе остаются дефолтные/caelestia после горячего свитча
group {
    col.border_active = $active_border
    col.border_inactive = $inactive_border
    col.border_locked_active = $active_border
    col.border_locked_inactive = $inactive_border
}

misc {
    vrr = 1
    focus_on_activate = true
    middle_click_paste = false
    on_focus_under_fullscreen = 2
    allow_session_lock_restore = true
    session_lock_xray = true
    mouse_move_enables_dpms = true
    key_press_enables_dpms = true
}

# ─── Жесты тачпада (тюнинг как в caelestia; его 3-пальцевый свайп
#     воркспейсов уже есть в keybindings.conf) ───
gestures {
    workspace_swipe_distance = 700
    workspace_swipe_cancel_ratio = 0.15
    workspace_swipe_min_speed_to_force = 5
    workspace_swipe_direction_lock = true
    workspace_swipe_direction_lock_threshold = 10
    workspace_swipe_create_new = true
}

# ─── Окружение: курсор + тулкиты (из env.lua) ───
env = HYPRCURSOR_THEME,volantes_cursors
env = HYPRCURSOR_SIZE,24
env = XCURSOR_THEME,volantes_cursors
env = XCURSOR_SIZE,24
env = QT_WAYLAND_DISABLE_WINDOWDECORATION,1
env = QT_AUTO_SCREEN_SCALE_FACTOR,1
env = GDK_BACKEND,wayland,x11
env = QT_QPA_PLATFORM,wayland;xcb
env = SDL_VIDEODRIVER,wayland,x11,windows
env = CLUTTER_BACKEND,wayland
env = _JAVA_AWT_WM_NONREPARENTING,1

# ─── Автостарт: сервисы из execs.lua, которых нет в его autostart.conf
#     (polkit/cliphist/playerctld у него уже есть) ───
exec-once = dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP
exec-once = nm-applet
exec-once = gnome-keyring-daemon --start --components=secrets
exec-once = trash-empty 30
exec-once = hyprctl setcursor volantes_cursors 24
exec-once = gsettings set org.gnome.desktop.interface cursor-theme volantes_cursors
exec-once = gsettings set org.gnome.desktop.interface cursor-size 24
exec-once = /usr/lib/geoclue-2.0/demos/agent
exec-once = sleep 1 && gammastep
exec-once = mpris-proxy
exec-once = easyeffects --gapplication-service
