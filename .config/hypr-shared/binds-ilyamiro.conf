# Бинды ТОЛЬКО для рига ilyamiro (hyprlang).
# Подключается ПОСЛЕДНИМ из profiles/ilyamiro/hypr/hyprland.conf, поэтому
# unbind+bind здесь переопределяет его keybindings.conf (генерится из
# settings.json). Восстанавливать source-строку после dotprofile update!
#
# Структура биндов сетапа:
#   binds.conf            — общие для всех ригов (SUPER+SHIFT+D свитчер)
#   binds-ilyamiro.conf   — только риг ilyamiro (этот файл):
#                           перенос caelestia-набора + адаптация его фич
#   .config/caelestia/hypr-user.lua — только риг caelestia (lua/hyprkcs)
#
# НЕ переносится (требует caelestia-шелл, в этом риге его нет):
#   запись экрана (caelestia record), схемы (scheme set), PiP (resizer),
#   sysmon-виджет. Скриншот/лок/буфер — замапены на его аналоги ниже.

$csScripts = ~/dotfiles/profiles/caelestia/hypr/scripts
$qsm = bash ~/.config/hypr/scripts/qs_manager.sh toggle

# ─── Снятие его биндов, которые перекрывает caelestia-набор ───
unbind = $mainMod, 1
unbind = $mainMod, 2
unbind = $mainMod, 3
unbind = $mainMod, 4
unbind = $mainMod, 5
unbind = $mainMod, 6
unbind = $mainMod, 7
unbind = $mainMod, 8
unbind = $mainMod, 9
unbind = $mainMod, 0
unbind = $mainMod SHIFT_L, 1
unbind = $mainMod SHIFT_L, 2
unbind = $mainMod SHIFT_L, 3
unbind = $mainMod SHIFT_L, 4
unbind = $mainMod SHIFT_L, 5
unbind = $mainMod SHIFT_L, 6
unbind = $mainMod SHIFT_L, 7
unbind = $mainMod SHIFT_L, 8
unbind = $mainMod SHIFT_L, 9
unbind = $mainMod SHIFT_L, 0
unbind = $mainMod, W
unbind = $mainMod, D
unbind = $mainMod, F
unbind = $mainMod, E
unbind = $mainMod, R
unbind = $mainMod, Q
unbind = $mainMod, S
unbind = $mainMod, C
unbind = $mainMod, V
unbind = $mainMod, P
unbind = $mainMod, L
unbind = $mainMod, TAB
unbind = $mainMod, up
unbind = $mainMod, down
unbind = $mainMod, left
unbind = $mainMod, right
unbind = $mainMod SHIFT_L, up
unbind = $mainMod SHIFT_L, down
unbind = $mainMod SHIFT_L, left
unbind = $mainMod SHIFT_L, right
unbind = $mainMod SHIFT_L, F
unbind = $mainMod SHIFT_L, S
unbind = $mainMod, mouse:272
unbind = $mainMod, mouse:273
# SPACE снят: SUPER+SPACE теперь переключает раскладку (grp:win_space_toggle,
# как в caelestia); play-pause остаётся на XF86AudioPlay/Pause.
unbind = $mainMod, SPACE
# B/N/H сняты и перевешаны ниже через rigdo (работают при горячем свитче).
unbind = $mainMod, B
unbind = $mainMod, N
unbind = $mainMod, H
# Оставлены его: RETURN(foot=терминал), SHIFT+T(focustime), Print(скриншоты)

# ─── Его фичи на новых местах ───
bind = $mainMod, Y, exec, ~/dotfiles/bin/rigdo wallpaper
bind = $mainMod, U, exec, ~/dotfiles/bin/rigdo launcher
bind = SHIFT, TAB, exec, ~/dotfiles/bin/rigdo launcher
bind = $mainMod SHIFT_L, O, exec, ~/dotfiles/bin/rigdo settings
bind = $mainMod SHIFT_L, TAB, exec, ~/.config/hypr/scripts/focus_next_monitor.sh  # было SUPER+TAB
bind = $mainMod ALT, M, exec, ~/dotfiles/bin/rigdo music
bind = $mainMod ALT, S, exec, ~/dotfiles/bin/rigdo calendar
bind = $mainMod ALT, P, exec, ~/dotfiles/bin/rigdo movies
bind = $mainMod, B, exec, ~/dotfiles/bin/rigdo battery
bind = $mainMod, N, exec, ~/dotfiles/bin/rigdo network
bind = $mainMod, H, exec, ~/dotfiles/bin/rigdo guide

# ─── Caelestia-набор: окна ───
bind = $mainMod, F, fullscreen, 0
bind = $mainMod ALT, F, fullscreen, 1
bind = $mainMod ALT, SPACE, togglefloating
bind = $mainMod SHIFT_L, F, togglefloating
bind = $mainMod, P, pin
bind = $mainMod, Q, killactive

# ─── Воркспейсы: навигация ───
bind = $mainMod, A, workspace, -1
bind = $mainMod, D, workspace, +1
bind = $mainMod, mouse_down, workspace, -1
bind = $mainMod, mouse_up, workspace, +1

# Нумерованные (мультимонитор через wsaction.fish)
bind = $mainMod, 1, exec, $csScripts/wsaction.fish workspace 1
bind = $mainMod, 2, exec, $csScripts/wsaction.fish workspace 2
bind = $mainMod, 3, exec, $csScripts/wsaction.fish workspace 3
bind = $mainMod, 4, exec, $csScripts/wsaction.fish workspace 4
bind = $mainMod, 5, exec, $csScripts/wsaction.fish workspace 5
bind = $mainMod, 6, exec, $csScripts/wsaction.fish workspace 6
bind = $mainMod, 7, exec, $csScripts/wsaction.fish workspace 7
bind = $mainMod, 8, exec, $csScripts/wsaction.fish workspace 8
bind = $mainMod, 9, exec, $csScripts/wsaction.fish workspace 9
bind = $mainMod, 0, exec, $csScripts/wsaction.fish workspace 10
bind = $mainMod SHIFT_L, 1, exec, $csScripts/wsaction.fish movetoworkspace 1
bind = $mainMod SHIFT_L, 2, exec, $csScripts/wsaction.fish movetoworkspace 2
bind = $mainMod SHIFT_L, 3, exec, $csScripts/wsaction.fish movetoworkspace 3
bind = $mainMod SHIFT_L, 4, exec, $csScripts/wsaction.fish movetoworkspace 4
bind = $mainMod SHIFT_L, 5, exec, $csScripts/wsaction.fish movetoworkspace 5
bind = $mainMod SHIFT_L, 6, exec, $csScripts/wsaction.fish movetoworkspace 6
bind = $mainMod SHIFT_L, 7, exec, $csScripts/wsaction.fish movetoworkspace 7
bind = $mainMod SHIFT_L, 8, exec, $csScripts/wsaction.fish movetoworkspace 8
bind = $mainMod SHIFT_L, 9, exec, $csScripts/wsaction.fish movetoworkspace 9
bind = $mainMod SHIFT_L, 0, exec, $csScripts/wsaction.fish movetoworkspace 10

# ─── Спец-воркспейсы ───
bind = $mainMod, S, togglespecialworkspace, specialws
bind = $mainMod, Z, exec, pgrep -x feishin && hyprctl dispatch togglespecialworkspace music || feishin
bind = $mainMod, X, exec, pgrep -x vesktop && hyprctl dispatch togglespecialworkspace communication || vesktop
bind = $mainMod, C, exec, pgrep -x obsidian && hyprctl dispatch togglespecialworkspace todo || obsidian "obsidian://open?vault=Shalyn_Vault"
bind = $mainMod, V, exec, pgrep -x AyuGram && hyprctl dispatch togglespecialworkspace messanger || AyuGram
bind = $mainMod SHIFT_L, X, movetoworkspace, e+0
binde = CTRL, J, exec, $csScripts/specialcycle.fish prev
binde = CTRL, L, exec, $csScripts/specialcycle.fish next

# ─── Приложения ───
bind = $mainMod, TAB, exec, app2unit -- foot
bind = $mainMod, W, exec, app2unit -- zen-browser
bind = $mainMod, R, exec, app2unit -- codium
bind = $mainMod, T, exec, app2unit -- hyprkcs
bind = $mainMod, E, exec, app2unit -- thunar

# ─── Утилиты (через rigdo: скриншот/лок/рестарт шелла активного рига) ───
bind = $mainMod SHIFT_L, S, exec, ~/dotfiles/bin/rigdo screenshot
bind = $mainMod, F1, exec, ~/dotfiles/bin/rigdo lock
bind = $mainMod, grave, exec, ~/dotfiles/bin/rigdo clipboard
bind = $mainMod, M, exec, ~/dotfiles/bin/rigdo shell
bind = $mainMod ALT, Escape, exec, systemctl poweroff

# ─── Громкость (как в caelestia) ───
bindle = , XF86AudioRaiseVolume, exec, wpctl set-volume -l 1.5 @DEFAULT_AUDIO_SINK@ 5%+
bindle = , XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindl = , XF86AudioMicMute, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle

# ─── Мышь ───
bindm = SHIFT, mouse:274, movewindow
bindm = CTRL, mouse:274, resizewindow
bind = $mainMod, mouse:272, movetoworkspace, -1
bind = $mainMod, mouse:273, movetoworkspace, +1
bind = $mainMod SHIFT_L, mouse:272, movetoworkspace, e+0
bind = $mainMod SHIFT_L, mouse:273, movetoworkspace, special:secret

# ─── Фокус (IJKL + стрелки) ───
bind = $mainMod, I, movefocus, u
bind = $mainMod, J, movefocus, l
bind = $mainMod, K, movefocus, d
bind = $mainMod, L, movefocus, r
bind = $mainMod, up, movefocus, u
bind = $mainMod, left, movefocus, l
bind = $mainMod, down, movefocus, d
bind = $mainMod, right, movefocus, r

# ─── Перемещение окна (SHIFT + IJKL + стрелки) ───
bind = $mainMod SHIFT_L, I, movewindow, u
bind = $mainMod SHIFT_L, J, movewindow, l
bind = $mainMod SHIFT_L, K, movewindow, d
bind = $mainMod SHIFT_L, L, movewindow, r
bind = $mainMod SHIFT_L, up, movewindow, u
bind = $mainMod SHIFT_L, left, movewindow, l
bind = $mainMod SHIFT_L, down, movewindow, d
bind = $mainMod SHIFT_L, right, movewindow, r

# ─── Ресайз (ALT + IJKL + стрелки) ───
binde = $mainMod ALT, I, resizeactive, 0 -10
binde = $mainMod ALT, K, resizeactive, 0 10
binde = $mainMod ALT, J, resizeactive, -10 0
binde = $mainMod ALT, L, resizeactive, 10 0
binde = $mainMod ALT, up, resizeactive, 0 -10
binde = $mainMod ALT, down, resizeactive, 0 10
binde = $mainMod ALT, left, resizeactive, -10 0
binde = $mainMod ALT, right, resizeactive, 10 0

# ─── Группы окон ───
bind = ALT, Q, togglegroup
binde = ALT, TAB, changegroupactive, f

# ─── Gamemode ───
bind = $mainMod, G, exec, notify-send -u critical 'GAMEMODE' 'ON: Keys Locked'
bind = $mainMod, G, submap, gamemode
submap = gamemode
bind = $mainMod, G, exec, notify-send -u low 'GAMEMODE' 'OFF'
bind = $mainMod, G, submap, reset
bindle = , XF86AudioRaiseVolume, exec, wpctl set-volume -l 1.5 @DEFAULT_AUDIO_SINK@ 5%+
bindle = , XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindl = , XF86AudioMicMute, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle
bindl = , XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
submap = reset
