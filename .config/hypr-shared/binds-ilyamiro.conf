# Бинды ТОЛЬКО для рига ilyamiro (hyprlang).
# Подключается последним из profiles/ilyamiro/hypr/hyprland.conf — поэтому
# unbind+bind здесь переопределяет его keybindings.conf (который генерится
# из settings.json). Восстанавливать source-строку после dotprofile update!
#
# Структура биндов сетапа:
#   binds.conf            — общие для всех ригов
#   binds-ilyamiro.conf   — только риг ilyamiro (этот файл)
#   .config/caelestia/hypr-user.lua — только риг caelestia (lua/hyprkcs)

# Пикер обоев (видео-обои здесь): его дефолт SUPER+W снят, наш — SUPER+Y (свободен в обоих ригах)
unbind = $mainMod, W
bind = $mainMod, Y, exec, bash ~/.config/hypr/scripts/qs_manager.sh toggle wallpaper

# Лаунчер приложений: его дефолт SUPER+D снят, наш — SUPER+U (свободен в обоих ригах)
unbind = $mainMod, D
bind = $mainMod, U, exec, bash ~/.config/hypr/scripts/qs_manager.sh toggle applauncher

# Терминал: foot вместо kitty
unbind = $mainMod, RETURN
bind = $mainMod, RETURN, exec, foot
