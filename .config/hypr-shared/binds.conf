# Общие кастомные бинды для всех риг-профилей (hyprlang).
# caelestia: hyprkcs не умеет source= — бинд продублирован в
#            .config/caelestia/hypr-user.lua (менять В ОБОИХ местах!)
# ilyamiro:  подключается строкой `source = ~/dotfiles/.config/hypr-shared/binds.conf`
#            в его user-конфиге (задача 5 плана)
bind = SUPER SHIFT, D, exec, ~/dotfiles/bin/dotprofile menu
